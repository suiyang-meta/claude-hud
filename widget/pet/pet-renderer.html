<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; }
    html, body {
      background: transparent;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
    }
    body { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }

    #bubble {
      position: absolute;
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 130px;
      padding: 4px 9px;
      background: rgba(20, 20, 20, 0.92);
      color: #f5f5f5;
      font-size: 11px;
      font-weight: 500;
      border-radius: 12px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease-out, transform 0.25s ease-out;
      transform-origin: bottom center;
    }
    #bubble.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 8px;
      height: 8px;
      background: rgba(20, 20, 20, 0.92);
    }

    #pet {
      width: 77px;
      height: 83px;
      cursor: pointer;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <div id="bubble"></div>
  <canvas id="pet" width="77" height="83"></canvas>
  <script src="pet-renderer.js"></script>
</body>
</html>
