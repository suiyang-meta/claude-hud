<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; }
    html, body {
      background: transparent;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif;
      color: #f0f0f0;
    }
    #panel {
      width: 100%;
      height: 100%;
      background: rgba(15, 15, 15, 0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .title  { font-size: 9px; letter-spacing: 2.2px; text-transform: uppercase; color: rgba(255,255,255,0.45); }
    .count  { font-size: 9px; color: rgba(255,255,255,0.25); }
    #grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 8px;
      height: calc(100% - 30px);
    }
    .slot {
      position: relative;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.18s ease, background 0.18s ease;
      overflow: hidden;
    }
    .slot:hover { border-color: rgba(255,204,0,0.6); background: rgba(255,255,255,0.04); }
    .slot.active { border-color: #ffcc00; box-shadow: inset 0 0 0 1px rgba(255,204,0,0.4); }
    .slot.vacant { border-style: dashed; }
    .slot .preview {
      width: 56px; height: 56px;
      background-position: 0 0;
      background-repeat: no-repeat;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .slot .vacant-mark { font-size: 22px; color: rgba(255,255,255,0.18); font-weight: 200; }
    .slot .name { position: absolute; bottom: 3px; left: 4px; right: 4px; font-size: 8px; color: rgba(255,255,255,0.5); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .slot .remove {
      position: absolute; top: 3px; right: 3px;
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(255,80,80,0.85); color: white;
      font-size: 9px; line-height: 14px; text-align: center;
      opacity: 0; transition: opacity 0.15s ease;
    }
    .slot:hover .remove { opacity: 1; }
    .slot .remove:hover { background: #ff4040; }
  </style>
</head>
<body>
  <div id="panel">
    <div class="header">
      <span class="title">Pet Library</span>
      <span class="count" id="count">0 / 6</span>
    </div>
    <div id="grid"></div>
  </div>
  <script src="library-renderer.js"></script>
</body>
</html>
