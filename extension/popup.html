<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      background: #0a0a0a;
      color: #fff;
      font-family: 'SF Mono', monospace;
      padding: 16px;
    }
    h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #666;
      margin-bottom: 14px;
    }
    .stat { margin-bottom: 12px; }
    .stat-label {
      font-size: 10px;
      color: #888;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    .stat-label span { color: #fff; font-weight: bold; }
    .bar-bg {
      height: 6px;
      background: #1a1a1a;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .green { background: #00ff88; }
    .yellow { background: #ffcc00; }
    .red { background: #ff4444; }
    .reset-info {
      font-size: 9px;
      color: #444;
      margin-top: 3px;
    }
    .no-data {
      font-size: 11px;
      color: #555;
      text-align: center;
      padding: 20px 0;
    }
    .ts {
      font-size: 9px;
      color: #333;
      margin-top: 12px;
      text-align: right;
    }
  </style>
</head>
<body>
  <h3>Claude HUD</h3>
  <div id="content"><div class="no-data">Open claude.ai to load data</div></div>
  <div id="ts" class="ts"></div>
  <script src="popup.js"></script>
</body>
</html>
